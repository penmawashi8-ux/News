name: JRA 競馬情報 YouTube Shorts 自動投稿

# ========================================
# トリガー設定
# ========================================
on:
  # -------------------------------------------------------
  # 【本番運用時はコメントアウトを外す】
  # 毎週土・日の22:00 JST（= UTC 13:00）に自動実行
  # ※ 祝日開催は is_jra_race_day() がJRA公式サイトで確認して対応
  # -------------------------------------------------------
  # schedule:
  #   - cron: '0 13 * * 6,0'

  # 手動実行（GitHub Actionsの "Run workflow" ボタンから）
  workflow_dispatch:
    inputs:
      scrape_only:
        description: |
          スクレイプ確認モード
          true  → スクレイピング＋AI原稿のみ。Step Summary にテキスト出力
          false → 動画生成モード（dry_run 設定に従う）★動画テストはこちら
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: |
          ドライランモード（scrape_only=false のときのみ有効）
          true  → 動画を生成して Artifacts に保存（YouTube投稿なし）
          false → YouTube に実際に投稿する
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: '開催日判定をスキップして強制実行（テスト時は true 推奨）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      test_date:
        description: |
          テスト日付（YYYYMMDD 形式）
          入力するとスクレイピングの基準日をその日付に固定する（例: 20260412）
          空欄の場合は実行日を使用する
        required: false
        default: '20260412'
        type: string

# ========================================
# 権限設定
# ========================================
permissions:
  contents: read

# ========================================
# ジョブ定義
# ========================================
jobs:
  post-jra-shorts:
    name: JRA Shorts 生成・投稿
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ========== リポジトリのチェックアウト ==========
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ========== Python セットアップ ==========
      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ========== システム依存パッケージのインストール（scrape_only 以外） ==========
      - name: FFmpeg インストール
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          ffmpeg -version

      # ========== NotoSansJP フォントの配置（scrape_only 以外） ==========
      - name: フォントファイルの配置
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          mkdir -p assets/fonts
          FONT_SRC=$(fc-list | grep -i "NotoSansCJK\|NotoSansJP\|noto.*bold" | head -1 | cut -d: -f1)
          if [ -n "$FONT_SRC" ]; then
            cp "$FONT_SRC" assets/fonts/NotoSansJP-Bold.ttf
            echo "フォントをコピーしました: $FONT_SRC"
          else
            echo "NotoSans フォントが見つかりません。デフォルトフォントを使用します。"
          fi

      # ========== VOICEVOX エンジン起動（scrape_only 以外） ==========
      - name: VOICEVOX エンジン起動
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          docker pull voicevox/voicevox_engine:cpu-ubuntu20.04-latest
          docker run -d \
            --name voicevox \
            -p 50021:50021 \
            voicevox/voicevox_engine:cpu-ubuntu20.04-latest
          echo "VOICEVOX エンジン起動中..."

      # ========== Python パッケージのインストール ==========
      - name: Python パッケージインストール
        run: pip install -r requirements.txt

      # ========== VOICEVOX の起動待ち（scrape_only 以外） ==========
      - name: VOICEVOX の起動を待機
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          echo "VOICEVOX の起動を最大3分待機..."
          for i in $(seq 1 36); do
            if curl -s http://localhost:50021/version > /dev/null 2>&1; then
              echo "VOICEVOX 起動確認完了 (${i}回目)"
              exit 0
            fi
            echo "待機中... ($i/36)"
            sleep 5
          done
          echo "::error::VOICEVOX が3分以内に起動しませんでした"
          docker logs voicevox || true
          exit 1

      # ========== JRA スクレイプ確認（scrape_only=true） ==========
      - name: JRA スクレイプ確認（テキスト出力）
        if: ${{ github.event.inputs.scrape_only == 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python main_jra.py --scrape-only $FORCE_FLAG

      # ========== JRA動画生成・投稿（scrape_only 以外） ==========
      - name: JRA YouTube Shorts 生成・投稿
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          VOICEVOX_URL: http://localhost:50021
          VOICEVOX_SPEAKER_ID: 3
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" != "false" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python main_jra.py $FORCE_FLAG $DRY_RUN_FLAG

      # ========== スクレイプ結果テキストをアーティファクト保存 ==========
      - name: スクレイプ結果をアーティファクトとして保存
        if: ${{ github.event.inputs.scrape_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: jra-scrape-result-${{ github.run_number }}
          path: output/*.txt
          retention-days: 7
          if-no-files-found: warn

      # ========== 動画をアーティファクトとして保存（ドライランのみ） ==========
      - name: 生成動画をアーティファクトとして保存
        if: ${{ github.event.inputs.scrape_only != 'true' && github.event.inputs.dry_run != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: jra-preview-video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: warn

      # ========== VOICEVOX コンテナの停止（scrape_only 以外） ==========
      - name: VOICEVOX コンテナの停止
        if: ${{ always() && github.event.inputs.scrape_only != 'true' }}
        run: docker stop voicevox && docker rm voicevox || true

      # ========== エラー時のログ保存 ==========
      - name: ログのアップロード（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jra-error-output-${{ github.run_number }}
          path: output/
          retention-days: 3
